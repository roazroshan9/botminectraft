name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared workspace libs
        run: |
          pnpm --filter @workspace/api-zod exec tsc --build
          pnpm --filter @workspace/db exec tsc --build 2>/dev/null || true

      - name: Generate Prisma client
        run: pnpm --filter @workspace/api-server exec prisma generate

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Typecheck API server
        run: pnpm --filter @workspace/api-server run typecheck
