<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Bot — Live Status</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3352;
    --accent: #5c7cfa;
    --green: #37b24d;
    --red: #e03131;
    --warn: #f59f00;
    --text: #c9d1d9;
    --muted: #6e7681;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; font-weight: 700; color: #fff; }
  .ws-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--red); display: inline-block; margin-right: 6px; transition: background 0.3s; }
  .ws-dot.on { background: var(--green); }
  .readonly-badge { font-size: 11px; background: rgba(92,124,250,0.15); color: var(--accent); border: 1px solid rgba(92,124,250,0.3); padding: 3px 10px; border-radius: 20px; font-weight: 600; }

  .container { max-width: 1000px; margin: 0 auto; padding: 24px 16px; }

  .bot-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 18px; }
  .bot-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .bot-name { font-weight: 700; color: #fff; font-size: 18px; }
  .badge { font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
  .badge.connected { background: rgba(55,178,77,0.15); color: var(--green); border: 1px solid rgba(55,178,77,0.3); }
  .badge.disconnected, .badge.error { background: rgba(224,49,49,0.15); color: var(--red); border: 1px solid rgba(224,49,49,0.3); }
  .badge.connecting { background: rgba(245,159,0,0.15); color: var(--warn); border: 1px solid rgba(245,159,0,0.3); }

  .server-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; margin-top: 2px; }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat { background: var(--surface2); border-radius: 8px; padding: 12px; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 700; color: #fff; }
  .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 3px; }
  .bar { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; margin-top: 6px; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .bar-green { background: var(--green); }
  .bar-warn { background: var(--warn); }

  .divider { height: 1px; background: var(--border); margin: 14px 0; }

  .section-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; font-weight: 600; }

  .log-box { background: #0a0c12; border-radius: 8px; padding: 10px 14px; height: 140px; overflow-y: auto; font-family: monospace; font-size: 11px; border: 1px solid var(--border); }
  .log-line { color: #7ec8a4; padding: 2px 0; line-height: 1.5; }
  .log-line.warn { color: var(--warn); }
  .log-line.err { color: var(--red); }

  .inv-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; }
  .inv-cell { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3px; }
  .inv-cell .cn { font-weight: 700; color: #fff; font-size: 12px; }
  .inv-cell .nm { color: var(--muted); text-align: center; font-size: 8px; word-break: break-all; line-height: 1.2; margin-top: 1px; }
  .inv-empty { opacity: 0.15; }

  .current-task { font-size: 13px; color: var(--accent); padding: 8px 12px; background: rgba(92,124,250,0.06); border-radius: 6px; border-left: 2px solid var(--accent); margin-bottom: 14px; }

  .no-bots { text-align: center; padding: 100px 20px; color: var(--muted); }
  .no-bots-icon { font-size: 48px; margin-bottom: 16px; }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .inv-grid { grid-template-columns: repeat(6, 1fr); }
  }
</style>
</head>
<body>

<header>
  <h1>⛏ MC Bot — Live Status</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="readonly-badge">👁 View Only</span>
    <span><span class="ws-dot" id="ws-dot"></span><span id="ws-lbl">Connecting...</span></span>
  </div>
</header>

<div class="container">
  <div id="no-bots" class="no-bots">
    <div class="no-bots-icon">🤖</div>
    <p>No bots online right now</p>
    <p style="font-size:12px;margin-top:8px">Bots will appear here automatically when connected</p>
  </div>
  <div id="bot-container"></div>
</div>

<script src="/api/socket.io/socket.io.js"></script>
<script>
const bots = {};
const socket = io({ path: '/api/socket.io/' });

socket.on('connect', () => {
  document.getElementById('ws-dot').className = 'ws-dot on';
  document.getElementById('ws-lbl').textContent = 'Live';
});

socket.on('disconnect', () => {
  document.getElementById('ws-dot').className = 'ws-dot';
  document.getElementById('ws-lbl').textContent = 'Offline';
});

socket.on('bots:all', data => {
  data.forEach(b => { bots[b.id] = b; });
  renderAll();
});

socket.on('bot:status', ({ id, status }) => {
  if (bots[id]) bots[id].status = status;
  const el = document.getElementById(`badge-${id}`);
  if (el) { el.className = `badge ${status}`; el.textContent = status; }
});

socket.on('bot:health', ({ id, health, food }) => {
  if (!bots[id]) return;
  bots[id].health = health; bots[id].food = food;
  setText(`h-${id}`, Math.round(health));
  setText(`f-${id}`, Math.round(food));
  setWidth(`hbar-${id}`, health / 20 * 100);
  setWidth(`fbar-${id}`, food / 20 * 100);
});

socket.on('bot:position', ({ id, pos }) => {
  if (pos) setText(`pos-${id}`, `${Math.round(pos.x)}, ${Math.round(pos.y)}, ${Math.round(pos.z)}`);
});

socket.on('bot:log', ({ id, entry }) => {
  const box = document.getElementById(`log-${id}`);
  if (!box) return;
  const line = entry.replace(/\[\d{4}-\d{2}-\d{2}T[\d:.Z]+\]\s?/, '').trim();
  const d = document.createElement('div');
  d.className = 'log-line' + (line.toLowerCase().includes('error') || line.toLowerCase().includes('fail') ? ' err' : line.toLowerCase().includes('warn') ? ' warn' : '');
  d.textContent = line;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
  while (box.children.length > 80) box.removeChild(box.firstChild);
});

socket.on('bot:inventory', ({ id, items }) => renderInventory(id, items));

socket.on('bot:tasks', ({ id, tasks }) => {
  const running = tasks.find(t => t.status === 'running');
  const el = document.getElementById(`task-${id}`);
  if (el) { el.textContent = running ? `⚡ ${running.name}` : ''; el.style.display = running ? 'block' : 'none'; }
});

function renderAll() {
  const arr = Object.values(bots);
  document.getElementById('no-bots').style.display = arr.length ? 'none' : 'block';
  arr.forEach(b => {
    if (!document.getElementById(`bot-${b.id}`))
      document.getElementById('bot-container').insertAdjacentHTML('beforeend', cardHTML(b));
    populateCard(b);
  });
}

function cardHTML(b) {
  return `
  <div class="bot-card" id="bot-${b.id}">
    <div class="bot-header">
      <div class="bot-name">${esc(b.username)}</div>
      <span class="badge ${b.status}" id="badge-${b.id}">${b.status}</span>
    </div>
    <div class="server-info">${esc(b.host)}:${b.port} &nbsp;•&nbsp; Minecraft ${b.version}</div>

    <div id="task-${b.id}" class="current-task" style="display:none"></div>

    <div class="stats-grid">
      <div class="stat">
        <div class="stat-val" id="h-${b.id}">—</div>
        <div class="stat-lbl">Health ❤️</div>
        <div class="bar"><div class="bar-fill bar-green" id="hbar-${b.id}" style="width:0%"></div></div>
      </div>
      <div class="stat">
        <div class="stat-val" id="f-${b.id}">—</div>
        <div class="stat-lbl">Food 🍗</div>
        <div class="bar"><div class="bar-fill bar-warn" id="fbar-${b.id}" style="width:0%"></div></div>
      </div>
      <div class="stat" style="grid-column:span 2">
        <div class="stat-val" id="pos-${b.id}" style="font-size:14px;margin-top:6px">—</div>
        <div class="stat-lbl">Position 📍</div>
      </div>
    </div>

    <div class="divider"></div>
    <div class="section-title">Live Logs 📋</div>
    <div class="log-box" id="log-${b.id}"></div>

    <div class="divider"></div>
    <div class="section-title">Inventory 🎒</div>
    <div class="inv-grid" id="inv-${b.id}"></div>
  </div>`;
}

function populateCard(b) {
  setText(`h-${b.id}`, Math.round(b.health || 0));
  setText(`f-${b.id}`, Math.round(b.food || 0));
  setWidth(`hbar-${b.id}`, (b.health || 0) / 20 * 100);
  setWidth(`fbar-${b.id}`, (b.food || 0) / 20 * 100);
  if (b.position) setText(`pos-${b.id}`, `${Math.round(b.position.x)}, ${Math.round(b.position.y)}, ${Math.round(b.position.z)}`);
  renderInventory(b.id, b.inventory || []);
  const box = document.getElementById(`log-${b.id}`);
  if (box && !box.children.length && b.logs) {
    b.logs.slice(-30).forEach(entry => {
      const line = entry.replace(/\[\d{4}-\d{2}-\d{2}T[\d:.Z]+\]\s?/, '').trim();
      const d = document.createElement('div');
      d.className = 'log-line';
      d.textContent = line;
      box.appendChild(d);
    });
    box.scrollTop = box.scrollHeight;
  }
}

function renderInventory(id, items) {
  const grid = document.getElementById(`inv-${id}`);
  if (!grid) return;
  const slots = Array(18).fill(null);
  items.forEach(item => { if (item.slot < 18) slots[item.slot] = item; });
  grid.innerHTML = slots.map(item => item
    ? `<div class="inv-cell" title="${esc(item.name)} ×${item.count}"><div class="cn">${item.count}</div><div class="nm">${item.name.replace(/_/g,' ').slice(0,10)}</div></div>`
    : `<div class="inv-cell inv-empty">·</div>`
  ).join('');
}

function setText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }
function setWidth(id, pct) { const el = document.getElementById(id); if (el) el.style.width = pct + '%'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
