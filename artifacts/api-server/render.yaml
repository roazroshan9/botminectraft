# ─────────────────────────────────────────────────────────────────────────────
# CraftBot — Render.com deployment configuration
#
# DEPLOY STEPS:
#   1. Push this repo to GitHub (or GitLab).
#   2. Go to https://dashboard.render.com → New → Blueprint.
#   3. Connect your repo — Render will find this file automatically.
#   4. In the "Environment" tab, set the secret values marked below.
#   5. Click "Apply" to deploy.
#   6. After first deploy, copy your service URL and set KEEP_ALIVE_URL.
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: craftbot-api
    runtime: node
    plan: free

    # Build from the monorepo root so pnpm workspace resolution works
    rootDir: .

    buildCommand: >
      npx pnpm@10 install --frozen-lockfile &&
      npx pnpm@10 --filter @workspace/api-server run build

    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs

    # Render injects PORT automatically; healthz is the lightweight probe
    healthCheckPath: /api/healthz

    envVars:
      # ── Runtime ────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      # Trust the Render reverse-proxy so rate-limiting sees real client IPs
      - key: TRUST_PROXY
        value: "1"

      # ── Database ───────────────────────────────────────────────────────────
      # Set this in the Render dashboard → Environment tab.
      # Use the Supabase session-pooler URL (port 5432):
      #   postgresql://postgres.<ref>:<pass>@aws-1-ap-southeast-2.pooler.supabase.com:5432/postgres?sslmode=require
      - key: DATABASE_URL
        sync: false

      # ── Auth ───────────────────────────────────────────────────────────────
      # Set in Render dashboard. Use the value from your Replit secrets.
      - key: JWT_SECRET
        sync: false

      # ── Admin dashboard password ────────────────────────────────────────────
      # Set in Render dashboard. Use the value from your Replit secrets.
      - key: DASHBOARD_PASSWORD
        sync: false

      # ── Email / SMTP ───────────────────────────────────────────────────────
      - key: SMTP_HOST
        value: smtp.gmail.com

      - key: SMTP_PORT
        value: "587"

      - key: SMTP_USER
        value: roazroshan@gmail.com

      - key: SMTP_FROM
        value: roazroshan@gmail.com

      # Set in Render dashboard — your Gmail App Password.
      - key: SMTP_PASS
        sync: false

      # ── Keep-Alive (free tier) ─────────────────────────────────────────────
      # Prevents the free-tier service from sleeping after 15 min of inactivity.
      # After your first deploy, set this to your Render service URL, e.g.:
      #   https://craftbot-api.onrender.com
      # Render also sets RENDER_EXTERNAL_URL automatically as a fallback.
      - key: KEEP_ALIVE
        value: "true"

      # - key: KEEP_ALIVE_URL
      #   value: https://craftbot-api.onrender.com
